
services:

  fastapi:
    image: oshobabz/fastapi:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8200:8000"

  streamlit:
    image: oshobabz/streamlit:dev
    build:
      context: ./streamlit_app
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      API_URL: http://fastapi:8000
